services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: reservas
      POSTGRES_USER: reservas
      POSTGRES_PASSWORD: reservas
    ports: ["8096:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservas -d reservas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build: .
    env_file: .env
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/reservas
      - DB_USERNAME=reservas
      - DB_PASSWORD=reservas
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - APP_COOKIE_SECURE=false
      - APP_COOKIE_SAMESITE=Lax
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["8095:8080"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=/api
    depends_on:
      api:
        condition: service_started
    ports: ["8089:80"]
    restart: unless-stopped

volumes:
  pgdata:
