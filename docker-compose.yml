services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: reservas
      POSTGRES_USER: reservas
      POSTGRES_PASSWORD: reservas
    ports: ["8096:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build: .
    env_file: .env
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/reservas
      - DB_USERNAME=reservas
      - DB_PASSWORD=reservas
      - APP_JWT_SECRET=dev-secret-key-1234567890-abcdef
      - APP_COOKIE_SECURE=false
      - SPRING_PROFILES_ACTIVE=prod
    depends_on: [postgres]
    ports: ["8095:8080"]
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=/api
    depends_on: [api]
    ports: ["8089:80"]

volumes:
  pgdata:
